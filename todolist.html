<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo list 2</title>
    <link rel="stylesheet" href="todolist2.css">
</head>
<body>
    <div class="manager">
        <input type="text" placeholder="Add your Tasks" class="bar">
        <div><button class="enter">Add</button></div>
    </div><br>
    <div class="slides">
        <p class="allTask">All</p>
        <p class="completedTask">Completed</p>
        <p class="pendingTask">Pending</p>
    </div>
    <p class="error"></p>
    <div class="completed"></div>
    <div class="add"></div>
    <div class="pending"></div>
    <script src="todolist.js">
    </script>
</body>
</html>
